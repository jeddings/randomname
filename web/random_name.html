<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Random Name Generator</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      label { display:block; margin-top: 12px; }
      textarea, input, select { width: 100%; max-width: 720px; }
      textarea { height: 180px; }
      pre { white-space: pre-wrap; background: #f6f8fa; padding: 12px; border-radius: 8px; max-width: 720px; }
      .row { max-width: 720px; }
      button { margin-top: 12px; }
      .small { color: #555; font-size: 12px; }
      .error { margin-top: 12px; color: #b00020; background: #fff1f1; border: 1px solid #ffd0d0; padding: 10px; border-radius: 6px; max-width: 720px; }
      .error pre { margin: 8px 0 0; background: transparent; padding: 0; }
    </style>
    <script src="../src/generatenames.js"></script>
  </head>
  <body>
    <h1>Random Name Generator</h1>

    <div class="row">
      <label>
        Seed list
        <select id="seedSelect"></select>
      </label>

      <div class="small" id="seedStatus"></div>
      <div id="errorBox" class="error" style="display:none;">
        <div id="errorSummary"></div>
        <pre id="errorDetails"></pre>
      </div>

      <label>Count <input id="num" type="number" value="10" min="1" max="100"></label>
      <label>Min length <input id="minLen" type="number" value="3" min="1" max="100"></label>
      <label>Max length <input id="maxLen" type="number" value="12" min="1" max="100"></label>

      <label><input id="filterDups" type="checkbox" checked> Filter duplicates (exclude exact seeds)</label>

      <button id="generateBtn">Generate</button>

      <h2>Generated</h2>
      <pre id="output"></pre>
    </div>

    <script>
      async function loadSeedManifest() {
        const res = await fetch("../data/seedlists.json");
        if (!res.ok) throw new Error("Failed to load seedlists.json");
        return await res.json();
      }

      async function loadSeedFile(filename) {
        const res = await fetch(`../data/${encodeURIComponent(filename)}`);
        if (!res.ok) throw new Error(`Failed to fetch seed file: ${filename}`);
        return await res.text();
      }

      function setStatus(msg) {
        document.getElementById("seedStatus").textContent = msg || "";
      }

      function clearError() {
        document.getElementById("errorBox").style.display = "none";
        document.getElementById("errorSummary").textContent = "";
        document.getElementById("errorDetails").textContent = "";
      }

      function showError(err, context) {
        const box = document.getElementById("errorBox");
        const summary = document.getElementById("errorSummary");
        const details = document.getElementById("errorDetails");

        const message = err && err.message ? err.message : String(err || "Unknown error");
        summary.textContent = context ? `${context}: ${message}` : message;
        details.textContent = err && err.stack ? err.stack : "";
        box.style.display = "block";
      }

      async function init() {
        const select = document.getElementById("seedSelect");
        const seeds = await loadSeedManifest();

        // Populate dropdown
        select.innerHTML = "";
        for (const f of seeds) {
          const opt = document.createElement("option");
          opt.value = f;
          opt.textContent = f;
          select.appendChild(opt);
        }

        setStatus(`Loaded ${seeds.length} seed list names. Select one and click Generate.`);
      }

      document.getElementById("generateBtn").addEventListener("click", async () => {
        const output = document.getElementById("output");
        output.textContent = "";
        clearError();
        setStatus("Loading seed list...");

        try {
          const seedFile = document.getElementById("seedSelect").value;
          const seedText = await loadSeedFile(seedFile);

          setStatus("Generating...");
          const num = parseInt(document.getElementById("num").value, 10);
          const minLen = parseInt(document.getElementById("minLen").value, 10);
          const maxLen = parseInt(document.getElementById("maxLen").value, 10);
          const filterDups = document.getElementById("filterDups").checked;

          // generateNames is defined in ../src/generatenames.js
          const result = generateNames(num, minLen, maxLen, seedText, filterDups);
          output.textContent = result;

          setStatus(`Done. Seed: ${seedFile}`);
        } catch (e) {
          setStatus(`Error: ${e.message}`);
          showError(e, "Generation failed");
        }
      });

      window.addEventListener("error", (event) => {
        const err = event.error || new Error(event.message || "Unhandled window error");
        setStatus(`Error: ${err.message}`);
        showError(err, "Unhandled error");
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason;
        const err = reason instanceof Error ? reason : new Error(String(reason || "Unhandled rejection"));
        setStatus(`Error: ${err.message}`);
        showError(err, "Unhandled promise rejection");
      });

      init().catch(e => {
        setStatus(`Error initializing: ${e.message}`);
        showError(e, "Initialization failed");
      });
    </script>
  </body>
</html>
